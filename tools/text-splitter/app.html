<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="../../favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本分割器</title>
    <link rel="canonical" href="https://www.htmls.dev/tools/text-splitter/app.html">
    <style>
        :root {
            --accent: #0ea5e9;
            --accent-soft: #0ea5e933;
            --bg-dark: #0f172a;
            --text: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0ea5e9 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: var(--accent);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
        }

        .btn-secondary {
            background: #64748b;
        }

        .checkbox {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .meta {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .output-box {
            background: #f8fafc;
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .result-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
        }

        .result-card h4 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .result-card div {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            word-break: break-all;
        }
    
        .tool-doc-link,
        .tool-home-link {
            position: fixed;
            top: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(15, 23, 42, 0.12);
            text-decoration: none;
            letter-spacing: 0.02em;
            z-index: 9999;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .tool-doc-link {
            right: 16px;
        }

        .tool-home-link {
            right: 74px;
        }

        .tool-doc-link:hover,
        .tool-home-link:hover {
            background: rgba(255, 255, 255, 1);
            border-color: rgba(15, 23, 42, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <a class="tool-home-link" href="../../index.html">首页</a>
    <a class="tool-doc-link" href="index.html">说明</a>
    <div class="container">
        <div class="header">
            <h1>文本分割器</h1>
            <p>按分隔符拆分文本并统计结果</p>
        </div>
        <div class="card">
            <div class="grid">
                <div>
                    <label>输入文本</label>
                    <textarea id="input" placeholder="粘贴需要拆分的文本"></textarea>
                </div>
                <div>
                    <label>分隔符</label>
                    <select id="delimiter">
                        <option value="newline" selected>换行</option>
                        <option value="comma">逗号</option>
                        <option value="space">空格</option>
                        <option value="tab">制表符</option>
                        <option value="custom">自定义</option>
                    </select>
                    <div class="row">
                        <input id="custom-delimiter" type="text" placeholder="自定义分隔符，如 | 或 ;" />
                    </div>
                    <div class="row">
                        <label class="checkbox"><input type="checkbox" id="trim" checked>去除首尾空白</label>
                        <label class="checkbox"><input type="checkbox" id="skip-empty" checked>忽略空项</label>
                    </div>
                    <div class="actions">
                        <button class="btn" id="split">开始拆分</button>
                        <button class="btn btn-secondary" id="copy">复制结果</button>
                        <button class="btn btn-secondary" id="clear">清空</button>
                        <button class="btn btn-secondary" id="sample">加载示例</button>
                    </div>
                    <div class="meta">共 <span id="count">0</span> 项</div>
                </div>
            </div>
            <div class="output-box">
                <label>输出列表（每行一项）</label>
                <textarea id="output" readonly placeholder="拆分结果"></textarea>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const delimiterSelect = document.getElementById('delimiter');
        const customDelimiter = document.getElementById('custom-delimiter');
        const trimToggle = document.getElementById('trim');
        const skipEmptyToggle = document.getElementById('skip-empty');
        const output = document.getElementById('output');
        const count = document.getElementById('count');

        function getDelimiter() {
            const mode = delimiterSelect.value;
            if (mode === 'newline') return /\r?\n/;
            if (mode === 'comma') return ',';
            if (mode === 'space') return /\s+/;
            if (mode === 'tab') return '\t';
            const custom = customDelimiter.value;
            return custom === '' ? /\r?\n/ : custom;
        }

        function splitText() {
            const value = input.value;
            if (!value) {
                output.value = '';
                count.textContent = '0';
                return;
            }
            const delimiter = getDelimiter();
            let parts = value.split(delimiter);
            if (trimToggle.checked) {
                parts = parts.map(item => item.trim());
            }
            if (skipEmptyToggle.checked) {
                parts = parts.filter(item => item !== '');
            }
            output.value = parts.join('\n');
            count.textContent = String(parts.length);
        }

        document.getElementById('split').addEventListener('click', splitText);
        document.getElementById('copy').addEventListener('click', () => {
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
        });
        document.getElementById('clear').addEventListener('click', () => {
            input.value = '';
            output.value = '';
            count.textContent = '0';
        });
        document.getElementById('sample').addEventListener('click', () => {
            input.value = '苹果, 香蕉, 梨, 西瓜';
            delimiterSelect.value = 'comma';
            customDelimiter.value = '';
            trimToggle.checked = true;
            skipEmptyToggle.checked = true;
            splitText();
        });
    </script>
    <script src="../../assets/clicks.js" defer></script>
</body>
</html>
